name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Install SwiftLint
      run: |
        brew install swiftlint

    - name: SwiftLint
      run: |
        swiftlint --strict --config .swiftlint.yml

    - name: Build PokemonIsland
      run: |
        cd PokemonIsland
        xcodebuild -project PokemonIsland.xcodeproj -scheme PokemonIsland -sdk iphonesimulator -configuration Debug build

    - name: Build PokemonWidget
      run: |
        cd PokemonIsland
        xcodebuild -project PokemonIsland.xcodeproj -scheme PokemonWidget -sdk iphonesimulator -configuration Debug build